<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Alarm Clock</title>
        <link rel="stylesheet" href="../style/radio03.css" />
    </head>
    <body>
        <div class="container">
            <h1>Cart Shed Alarm Clock</h1>
            <div class="clock" id="clock">00:00:00</div>
            <div class="next-alarm" id="nextAlarm">No alarms set</div>

            <div class="controls">
                <button id="muteBtn">
                    Mute <span class="mute-indicator" id="muteIndicator"></span>
                </button>
                <button id="testSound">Play sound</button>
                <button id="stopSound">Stop Sound</button>
                <button id="showAddAlarm">Add Alarm</button>
                <span id="unlockStatus" class="status"></span>
            </div>

            <div class="alarm-form-container" id="alarmFormContainer">
                <div class="alarm-form">
                    <input type="time" id="alarmTime" />
                    <div class="day-select" id="daySelect">
                        <label><input type="checkbox" value="1" /> Mon</label>
                        <label><input type="checkbox" value="2" /> Tue</label>
                        <label><input type="checkbox" value="3" /> Wed</label>
                        <label><input type="checkbox" value="4" /> Thu</label>
                        <label><input type="checkbox" value="5" /> Fri</label>
                        <label><input type="checkbox" value="6" /> Sat</label>
                        <label><input type="checkbox" value="0" /> Sun</label>
                    </div>
                </div>

                <div class="sound-controls">
                    <select id="soundSelect">
                        <option value="">-- Select Sound --</option>
                        <option value="tone">Tone (autoplay)</option>
                        <option value="beep">Beep (autoplay)</option>
                        <option
                            value="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrLBhNjVgodDbq2EcBj+a2teleQAA"
                        >
                            Simple Beep (autoplay)
                        </option>
                        <option value="---STREAMS---" disabled>
                            --- Radio (autoplay after click) ---
                        </option>
                    </select>
                </div>
                <div class="alarm-form-buttons">
                    <button id="cancelAlarm">Cancel</button>
                    <button id="addAlarm">OK</button>
                </div>
            </div>

            <p class="info">
                <strong>Tip:</strong> Click "Test" or any button to unlock
                autoplay for radio streams in this session.
            </p>

            <h2>Alarms</h2>
            <div class="alarms-list" id="alarmsList"></div>

            <div id="version">v0.3, 29 Apr 2026</div>
        </div>

        <script src="../js/radiostations.js"></script>
        <script src="../js/radio03.js"></script>
    </body>
</html>
